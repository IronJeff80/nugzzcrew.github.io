name: Daily Gun Van Scraper

on:
  schedule:
    - cron: '2 6 * * *' # Scheduled for 06:02 UTC 
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'

      # Installs the fully functional browser application container required by Puppeteer
      - name: Setup Headless Google Chrome Engine
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper Script
        run: node scripts/update-gunvan.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/gunvan.json
          git commit -m "🤖 Auto-update Gun Van location" || echo "No changes to commit"
          git push